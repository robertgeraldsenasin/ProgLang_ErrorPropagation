pack_id: sqlite-zero-budget-pack-v1
description: Curated Spider2-Lite SQLite task pack for free-manual comparative testing.
selection_principles:
- Use only SQLite-backed Spider2-Lite tasks so execution is fully local and reproducible.
- Reserve pilot tasks for workflow debugging rather than headline reporting.
- Use the same main task set for every model to keep trajectories comparable.
- Keep a small holdout pack for robustness checks after the main comparison is stable.
